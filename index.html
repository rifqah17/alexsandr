<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<title>Для моего Sasha 💖</title>

<style>
body {
  margin: 0;
  overflow: hidden;
  font-family: 'Comic Sans MS', cursive;
  background: black;
  color: white;
  text-align: center;
}

.heart {
  position: fixed;
  color: pink;
  font-size: 20px;
  animation: fall linear infinite;
}

@keyframes fall {
  0% {transform: translateY(-10vh);}
  100% {transform: translateY(110vh);}
}

.container {
  position: absolute;
  top: 55%;
  left: 50%;
  transform: translate(-50%, -50%);
}

button {
  padding: 15px 25px;
  font-size: 18px;
  border-radius: 20px;
  border: none;
  background: pink;
  cursor: pointer;
}

#text {
  font-size: 22px;
  max-width: 600px;
  margin: auto;
}

#countdown {
  font-size: 50px;
  margin-bottom: 20px;
}

/* girl animation */
.girl {
  width: 200px;
  position: relative;
  animation: walk 6s infinite alternate;
}

/* jalan */
@keyframes walk {
  0% { left: -30px; }
  100% { left: 30px; }
}

/* kasih kue ke layar */
.cake {
  width: 150px;
  margin-top: 10px;
  animation: giveCake 2s infinite alternate;
}

@keyframes giveCake {
  from { transform: scale(1); }
  to { transform: scale(1.2); }
}
</style>
</head>

<body>

<div class="container">

  <!-- CEWEK -->
  <img class="girl" src="https://media.giphy.com/media/26BRv0ThflsHCqDrG/giphy.gif">

  <!-- KUE -->
  <img class="cake" src="https://media.giphy.com/media/l0MYyDa8S9ghzNebm/giphy.gif">

  <div id="countdown">3</div>
  <h1>🎂 Это для тебя, Sasha... 💖</h1>
  <button onclick="start()">Нажми сюда 😳</button>
  <p id="text"></p>
</div>

<!-- 🎵 MUSIK (FIX WORKING) -->
<audio id="music" loop>
  <source src="https://cdn.pixabay.com/download/audio/2022/03/15/audio_115b9b1b78.mp3?filename=happy-birthday-254480.mp3" type="audio/mpeg">
</audio>

<script>
function createHeart() {
  const heart = document.createElement("div");
  heart.classList.add("heart");
  heart.innerHTML = "💖";
  heart.style.left = Math.random() * 100 + "vw";
  heart.style.animationDuration = Math.random() * 3 + 2 + "s";
  document.body.appendChild(heart);

  setTimeout(() => heart.remove(), 5000);
}
setInterval(createHeart, 300);

/* countdown */
let count = 3;
const countdownEl = document.getElementById("countdown");

const countdown = setInterval(() => {
  count--;
  countdownEl.innerHTML = count;

  if (count === 0) {
    clearInterval(countdown);
    countdownEl.innerHTML = "🎉";
  }
}, 1000);

/* message */
const message = [
"С днём рождения, Sasha 🎂💖",
"",
"Сегодня особенный день...",
"",
"Я желаю тебе здоровья, счастья ✨",
"И чтобы всё у тебя было хорошо 💫",
"",
"Hubby… ",
"Ты иногда вредный...",
"Но я всё равно тебя люблю 💕",
"",
"Ты мой самый любимый человек 🥺",
"",
"И теперь слушай внимательно...",
"",
"СКОРЕЕ ПРИЕЗЖАЙ КО МНЕ 💖",
"Я ЖДУ ТЕБЯ, HUBBY!!!"
];

let i = 0;
let j = 0;

function start() {
  document.querySelector("button").style.display = "none";
  document.getElementById("music").play();
  typeWriter();
}

function typeWriter() {
  if (i < message.length) {
    if (j < message[i].length) {
      document.getElementById("text").innerHTML += message[i].charAt(j);
      j++;
      setTimeout(typeWriter, 50);
    } else {
      document.getElementById("text").innerHTML += "<br><br>";
      j = 0;
      i++;
      setTimeout(typeWriter, 500);
    }
  }
}
</script>

</body>
</html>
