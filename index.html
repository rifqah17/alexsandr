<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<title>Для моего Саши 💖</title>

<style>
body {
  margin: 0;
  overflow: hidden;
  font-family: 'Comic Sans MS', cursive;
  background: black;
  color: white;
  text-align: center;
}

.heart {
  position: fixed;
  color: pink;
  font-size: 20px;
  animation: fall linear infinite;
}

@keyframes fall {
  0% {transform: translateY(-10vh);}
  100% {transform: translateY(110vh);}
}

.container {
  position: absolute;
  top: 55%;
  left: 50%;
  transform: translate(-50%, -50%);
}

button {
  padding: 15px 25px;
  font-size: 18px;
  border-radius: 20px;
  border: none;
  background: pink;
  cursor: pointer;
}

#text {
  font-size: 22px;
  max-width: 600px;
  margin: auto;
}

#countdown {
  font-size: 50px;
  margin-bottom: 20px;
}

/* GIF */
.girl {
  width: 200px;
  margin-bottom: 20px;
  animation: float 3s ease-in-out infinite;
}

@keyframes float {
  0% {transform: translateY(0);}
  50% {transform: translateY(-10px);}
  100% {transform: translateY(0);}
}
</style>
</head>

<body>

<div class="container">
  <!-- GIF CEWEK -->
  <img class="girl" src="https://media.giphy.com/media/3o6ZtpxSZbQRRnwCKQ/giphy.gif" alt="birthday girl">

  <div id="countdown">3</div>
  <h1>🎂 Это для тебя, Саша... 💖</h1>
  <button onclick="start()">Нажми сюда 😳</button>
  <p id="text"></p>
</div>

<audio id="music" loop>
  <source src="https://www.bensound.com/bensound-music/bensound-romantic.mp3" type="audio/mpeg">
</audio>

<script>
function createHeart() {
  const heart = document.createElement("div");
  heart.classList.add("heart");
  heart.innerHTML = "💖";
  heart.style.left = Math.random() * 100 + "vw";
  heart.style.animationDuration = Math.random() * 3 + 2 + "s";
  document.body.appendChild(heart);

  setTimeout(() => heart.remove(), 5000);
}
setInterval(createHeart, 300);

/* Countdown */
let count = 3;
const countdownEl = document.getElementById("countdown");

const countdown = setInterval(() => {
  count--;
  countdownEl.innerHTML = count;

  if (count === 0) {
    clearInterval(countdown);
    countdownEl.innerHTML = "🎉";
  }
}, 1000);

/* Message */
const message = [
"С днём рождения, Саша 🎂💖",
"",
"Сегодня не просто обычный день...",
"Это день, когда родился самый важный человек в моей жизни 🥺",
"",
"Я желаю тебе здоровья, счастья,",
"и чтобы всё в твоей жизни проходило легко ✨",
"",
"Пусть твоя карьера становится только лучше 😤💖",
"",
"Ты иногда вредный 😭",
"Но я всё равно тебя люблю 💕",
"",
"И теперь слушай внимательно...",
"",
"СКОРЕЕ ПРИЕЗЖАЙ КО МНЕ 😭💖",
"Я ЖДУ ТЕБЯ!!!",
"",
"Я люблю тебя, Саша 💖"
];

let i = 0;
let j = 0;

function start() {
  document.querySelector("button").style.display = "none";
  document.getElementById("music").play();
  typeWriter();
}

function typeWriter() {
  if (i < message.length) {
    if (j < message[i].length) {
      document.getElementById("text").innerHTML += message[i].charAt(j);
      j++;
      setTimeout(typeWriter, 50);
    } else {
      document.getElementById("text").innerHTML += "<br><br>";
      j = 0;
      i++;
      setTimeout(typeWriter, 500);
    }
  }
}
</script>

</body>
</html>
